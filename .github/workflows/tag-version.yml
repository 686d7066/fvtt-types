name: Tag Package Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate package version
        id: package
        shell: pwsh
        run: |
          $package = Get-Content -Path "package.json" -Raw | ConvertFrom-Json
          $version = [string] $package.version

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "package.json version '$version' must use x.y.z with numeric parts."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create version tag
        shell: pwsh
        run: |
          $version = "${{ steps.package.outputs.version }}"

          if (git rev-parse "refs/tags/$version" 2>$null) {
            "Tag $version already exists."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$version"
          git push origin "$version"
