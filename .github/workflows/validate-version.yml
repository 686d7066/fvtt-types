name: Validate Version

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate package version increased
        run: npm exec -- tsx .github/scripts/validate-package-version.ts
